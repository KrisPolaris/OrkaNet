<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BebechChat 💬</title>
<style>
    @font-face { 
        font-family: 'MojaCzcionka'; 
        src: url('ok.woff2') format('woff2'), 
             url('ok.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    body { 
        background: #000; color: #00ff00; 
        font-family: 'MojaCzcionka', Arial, sans-serif;
        display: flex; flex-direction: column; 
        height: 100vh; /* Sztywna wysokość ekranu */
        margin: 0; 
        overflow: hidden;
    }
    
    input, button, .room-btn, h2 {
        font-family: 'MojaCzcionka', Arial, sans-serif !important;
    }

    .chat-header {
        display: flex; align-items: center; justify-content: center;
        padding: 10px; background: #0a0a0a; border-bottom: 2px solid #00ff00;
        flex-shrink: 0;
    }

    #header-logo {
        width: 45px; height: 45px; border-radius: 50%;
        border: 2px solid #00ff00; margin-right: 12px;
        box-shadow: 0 0 10px #00ff00; object-fit: cover; cursor: pointer;
    }

    .chat-selector {
        display: flex; justify-content: center; gap: 8px;
        padding: 10px; background: #111;
        flex-shrink: 0;
    }

    .room-btn {
        padding: 8px 15px; font-size: 11px; background: #222;
        color: #00ff00; border: 1px solid #00ff00; border-radius: 20px;
        cursor: pointer;
    }

    .room-btn.active {
        background: #00ff00; color: #000; box-shadow: 0 0 15px #00ff00;
    }

    /* NAPRAWIONE OKNO CZATU */
    #chat-window { 
        flex: 1; 
        min-height: 0; /* To pozwala oknu się kurczyć */
        overflow-y: auto; padding: 15px; 
        display: flex; flex-direction: column;
        scroll-behavior: smooth;
    }

    .msg { 
        position: relative; margin-bottom: 15px; padding: 12px; 
        border-radius: 18px; max-width: 85%; width: fit-content; 
        word-wrap: break-word;
    }

    .msg-left { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #333; }
    .msg-right { background: #004d00; align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid #00ff00; }
    .msg-bot { border: 1px solid #ffcc00 !important; box-shadow: 0 0 5px #ffcc00; }

    .user { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; color: #00ff00; display: flex; align-items: center; gap: 5px; }

    .emoji { width: 24px; height: 24px; vertical-align: middle; margin: 0 2px; border-radius: 4px; }
    .chat-img { max-width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid #00ff00; display: block; cursor: pointer; }
    
    .del-btn { 
        position: absolute; right: -8px; top: -8px; 
        background: #ff0000; color: #fff; border: none; 
        border-radius: 50%; width: 20px; height: 20px; cursor: pointer;
        font-size: 10px; display: flex; align-items: center; justify-content: center;
    }

    /* NAPRAWIONY PASEK WPISYWANIA */
    .input-area { 
        padding: 10px; background: #111; display: flex; gap: 6px; 
        border-top: 2px solid #00ff00; align-items: center;
        flex-shrink: 0; /* Pasek nigdy nie zniknie */
    }

    input { background: #222; border: 1px solid #00ff00; color: #fff; padding: 10px; border-radius: 8px; outline: none; flex: 1; min-width: 0; }
    
    button { background: #00ff00; color: #000; border: none; padding: 10px; font-weight: bold; border-radius: 8px; cursor: pointer; white-space: nowrap; }
</style>
</head>
<body>

    <div class="chat-header">
        <img src="Bebe.jpg" id="header-logo">
        <h2 id="chat-title">OGÓLNY 🌐</h2>
    </div>

    <div class="chat-selector">
        <button id="btn-global" class="room-btn active">GŁÓWNY 1</button>
        <button id="btn-global2" class="room-btn">GŁÓWNY 2</button>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Pisz tutaj... (:bebzun: :pou:)">
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <button id="btn-img">🖼️</button>
        <button id="sendBtn">SEND</button>
        <button onclick="window.location.href='super.html'" style="background:#444; color:white;">X</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPvjNjR6nTHQuWdhQGAGk9iJgvPKDQTXA",
            authDomain: "bebechchat.firebaseapp.com",
            projectId: "bebechchat",
            storageBucket: "bebechchat.firebasestorage.app",
            messagingSenderId: "738356779230",
            appId: "1:738356779230:web:2c41e46431284e3fb78a4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const loggedUser = localStorage.getItem('loggedUser') || "Gość";
        let currentRoom = 'global';

        function switchRoom(room, img, title) {
            currentRoom = room;
            document.getElementById('header-logo').src = img;
            document.getElementById('chat-title').innerText = title;
            document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
            
            if(room === 'global') document.getElementById('btn-global').classList.add('active');
            else document.getElementById('btn-global2').classList.add('active');
            
            listenToMessages();
        }

        document.getElementById('btn-global').onclick = () => switchRoom('global', 'Bebe.jpg', 'OGÓLNY 🌐');
        document.getElementById('btn-global2').onclick = () => switchRoom('global2', 'Bebe.jpg', 'GŁÓWNY 2 🌍');

        async function botBebzun(userText) {
            const triggers = ['bebzun', 'bebech'];
            if (triggers.some(t => userText.toLowerCase().includes(t))) {
                setTimeout(async () => {
                    await addDoc(collection(db, "messages"), {
                        user: "Bebzun 🤖", 
                        text: "CZY JA BYŁEM PRZYWOŁANY?", 
                        room: currentRoom, 
                        timestamp: serverTimestamp(),
                        isBot: true
                    });
                }, 800);
            }
        }

        function parseEmotes(text) {
            if(!text) return "";
            return text.replace(/:bebzun:/g, `<img src="Bebe.jpg" class="emoji">`)
                       .replace(/:pou:/g, `<img src="pou.png" class="emoji">`);
        }

        async function sendMessage() {
            const msgInp = document.getElementById('message');
            const fileInp = document.getElementById('imageInput');
            const file = fileInp.files[0];
            let imgData = null;
            let val = msgInp.value;

            if (file) {
                const reader = new FileReader();
                imgData = await new Promise(r => { 
                    reader.onload = e => r(e.target.result); 
                    reader.readAsDataURL(file); 
                });
            }

            if (val.trim() || imgData) {
                await addDoc(collection(db, "messages"), {
                    user: loggedUser, 
                    text: val, 
                    image: imgData,
                    room: currentRoom, 
                    timestamp: serverTimestamp()
                });
                
                if(val.trim()) botBebzun(val);

                msgInp.value = ""; 
                fileInp.value = "";
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('message').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        document.getElementById('btn-img').onclick = () => document.getElementById('imageInput').click();
        document.getElementById('header-logo').onclick = () => {
            document.body.style.filter = "hue-rotate(180deg)";
            setTimeout(() => document.body.style.filter = "none", 2000);
        };

        window.removeMsg = async (id) => { 
            if(confirm("Usunąć wiadomość?")) await deleteDoc(doc(db, "messages", id)); 
        };

        let unsubscribe;
        function listenToMessages() {
            if (unsubscribe) unsubscribe();
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            unsubscribe = onSnapshot(q, (snap) => {
                const win = document.getElementById('chat-window');
                win.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    if (data.room === currentRoom) {
                        const isMe = data.user === loggedUser;
                        const isBot = data.user === "Bebzun 🤖";
                        const div = document.createElement('div');
                        div.className = `msg ${isMe ? 'msg-right' : 'msg-left'} ${isBot ? 'msg-bot' : ''}`;
                        
                        div.innerHTML = `
                            <span class="user" ${isBot ? 'style="color:#ffcc00"' : ''}>
                                ${isBot ? `<img src="Bebe.jpg" style="width:18px;height:18px;border-radius:50%">` : ''}
                                ${data.user}
                            </span>
                            <span class="text">${parseEmotes(data.text)}</span>
                            ${data.image ? `<img src="${data.image}" class="chat-img" onclick="window.open(this.src)">` : ""}
                            ${isMe ? `<button class="del-btn" onclick="removeMsg('${d.id}')">X</button>` : ""}
                        `;
                        win.appendChild(div);
                    }
                });
                win.scrollTop = win.scrollHeight;
            });
        }

        listenToMessages();
    </script>
</body>
</html>
