<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witamy na Steam</title>
    <style>
        /* --- STYL STEAM --- */
        body {
            background-color: #1b2838; /* Klasyczny granat Steam */
            color: #c6d4df;
            font-family: "Motiva Sans", Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* NAGŁÓWEK */
        header {
            background-color: #171a21;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .steam-logo {
            height: 35px;
        }

        .menu-icon {
            font-size: 24px;
            color: white;
        }

        /* NIEBIESKI PASEK NAWIGACJI */
        .nav-bar {
            background: linear-gradient(to right, #3d4450, #202326);
            padding: 10px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            white-space: nowrap;
            font-size: 13px;
            text-transform: uppercase;
        }

        .nav-bar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* GŁÓWNY BANER (Featured) */
        .featured-area {
            background: linear-gradient(to bottom, #1b2838, #000000);
            padding: 15px;
        }

        .main-cap {
            width: 100%;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        /* LISTA GIER (Kafelki) */
        .section-title {
            padding: 15px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.2);
            margin: 0 15px 15px 15px;
            display: flex;
            flex-direction: column;
        }

        .game-img {
            width: 100%;
        }

        .game-info {
            padding: 10px;
            background: linear-gradient(to right, #222b35, #192028);
        }

        .game-name {
            font-size: 15px;
            color: white;
            margin-bottom: 5px;
        }

        .price-tag {
            background-color: #000000;
            color: #acdbf5;
            padding: 5px;
            display: inline-block;
            font-size: 12px;
        }

        .discount {
            background-color: #4c6b22;
            color: #beee11;
            padding: 5px;
            font-weight: bold;
        }

        /* STOPKA DLA MOBILE */
        footer {
            background-color: #000000;
            padding: 30px 15px;
            text-align: center;
            font-size: 11px;
            color: #8f98a0;
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon">☰</div>
        <img src="https://store.cloudflare.steamstatic.com/public/shared/images/header/logo_steam.svg?t=962016" alt="Steam" class="steam-logo">
        <div style="width: 24px;"></div> </header>

    <nav class="nav-bar">
        <a href="#">Twoja kolejka</a>
        <a href="#">Lista życzeń</a>
        <a href="#">Sklep punktów</a>
        <a href="#">Nowości</a>
    </nav>

    <div class="featured-area">
        <h2 class="section-title">Wyróżnione i polecane</h2>
        <a href="game1.html">
            <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1245620/capsule_616x353.jpg" class="main-cap" alt="ELDEN RING">
        </a>
    </div>

    <main>
        <h2 class="section-title">Oferty specjalne</h2>

        <div class="game-card">
            <img src="mi.jpg" onerror="this.src='https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3527290/31bac6b2eccf09b368f5e95ce510bae2baf3cfcd/header.jpg?t=1773856924'" class="game-img">
            <div class="game-info">
                <div class="game-name">PEAK</div>
                <span class="discount">-50%</span>
                <span class="price-tag">15,49zł</span>
            </div>
        </div>

        <div class="game-card">
            <img src="mi2.jpg" onerror="this.src='https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/730/capsule_616x353.jpg'" class="game-img">
            <div class="game-info">
                <div class="game-name">Counter Strike 2</div>
                <span class="price-tag">Za darmo</span>
            </div>
        </div>
    </main>

    <footer>
        <img src="https://store.cloudflare.steamstatic.com/public/shared/images/footer/logo_valve_footer.png" width="80"><br><br>
        © 2026 Valve Corporation. Wszelkie prawa zastrzeżone. Wszystkie znaki towarowe są własnością ich odpowiednich właścicieli w USA i innych krajach.
    </footer>

</body>
</html>
