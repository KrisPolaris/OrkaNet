<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>3D City Drive Explorer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #a0d8ef; font-family: sans-serif; user-select: none; }
        #canvas-container { width: 100%; height: 100vh; }
        
        /* UI Elementy */
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #speedometer { font-size: 24px; font-weight: bold; }
        
        /* Kontrolki Dotykowe */
        #touch-controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; display: none; /* Domyślnie ukryte */ }
        .touch-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }
        .touch-btn:active { background: rgba(255,255,255,0.5); }
        #pedals { display: flex; gap: 15px; }
        #steering { display: flex; gap: 15px; }

        /* Pokaż kontrolki dotykowe na urządzeniach mobilnych */
        @media (pointer: coarse) {
            #touch-controls { display: flex; }
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="speedometer">0 km/h</div>
    <div>Użyj STRZAŁEK na PC lub przycisków na ekranie</div>
</div>

<div id="touch-controls">
    <div id="steering">
        <div class="touch-btn" id="btn-left">←</div>
        <div class="touch-btn" id="btn-right">→</div>
    </div>
    <div id="pedals">
        <div class="touch-btn" id="btn-brake">X</div>
        <div class="touch-btn" id="btn-gas">▲</div>
    </div>
</div>

<div id="canvas-container"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- Ustawienia Sceny ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 8); // Trzecia osoba, lekko z góry

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // Włączamy cienie!
    container.appendChild(renderer.domElement);

    // --- Światło ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.5)); // Światło otoczenia

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    // Ustawienia cieni
    sun.shadow.camera.left = -50; sun.shadow.camera.right = 50;
    sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50;
    sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    // --- Budowanie Samochodu (Uproszczony 3D) ---
    const car = new THREE.Group();
    scene.add(car);

    // Karoseria
    const bodyGeo = new THREE.BoxGeometry(1.8, 0.6, 4);
    const carMat = new THREE.MeshStandardMaterial({ color: 0xffff00, metalness: 0.6, roughness: 0.4 });
    const carBody = new THREE.Mesh(bodyGeo, carMat);
    carBody.position.y = 0.6;
    carBody.castShadow = true;
    car.add(carBody);

    // Kabina
    const cabinGeo = new THREE.BoxGeometry(1.4, 0.5, 2);
    const carCabin = new THREE.Mesh(cabinGeo, carMat);
    carCabin.position.set(0, 1.15, -0.2);
    car.add(carCabin);

    // Szyba
    const glassGeo = new THREE.BoxGeometry(1.3, 0.4, 1);
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x222222, opacity: 0.8, transparent: true });
    const glass = new THREE.Mesh(glassGeo, glassMat);
    glass.position.set(0, 1.15, 0.4);
    car.add(glass);

    // Koła (Cylindry)
    const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const wheelPositions = [
        [-0.9, 0.4, 1.3], [0.9, 0.4, 1.3], // Przód
        [-0.9, 0.4, -1.3], [0.9, 0.4, -1.3] // Tył
    ];
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(...pos);
        car.add(wheel);
    });

    // --- Generowanie Miasta (Infinite) ---
    const cityObjects = [];
    let cityZOffset = 0;
    const chunkSize = 20; // Długość jednego sektora ulicy

    // Podstawowe Geometrie
    const geometries = {
        road: new THREE.PlaneGeometry(12, chunkSize),
        sidewalk: new THREE.PlaneGeometry(4, chunkSize),
        treeTrunk: new THREE.CylinderGeometry(0.2, 0.2, 2, 8),
        treeTop: new THREE.ConeGeometry(1, 2.5, 8),
        building: new THREE.BoxGeometry(1, 1, 1), // Baza do skalowania
        river: new THREE.PlaneGeometry(100, chunkSize)
    };

    // Materiały
    const materials = {
        road: new THREE.MeshStandardMaterial({ color: 0x333333 }),
        sidewalk: new THREE.MeshStandardMaterial({ color: 0x999999 }),
        grass: new THREE.MeshStandardMaterial({ color: 0x55aa55 }),
        treeTrunk: new THREE.MeshStandardMaterial({ color: 0x8b4513 }),
        treeTop: new THREE.MeshStandardMaterial({ color: 0x006600 }),
        house: new THREE.MeshStandardMaterial({ color: 0xccaa88 }),
        block: new THREE.MeshStandardMaterial({ color: 0xaaaaaa }),
        skyscrapers: new THREE.MeshStandardMaterial({ color: 0xdddddd }),
        river: new THREE.MeshStandardMaterial({ color: 0x3366ff, transparent: true, opacity: 0.8 })
    };

    function createTree(x, z) {
        const trunk = new THREE.Mesh(geometries.treeTrunk, materials.treeTrunk);
        trunk.position.set(x, 1, z);
        trunk.castShadow = true;
        
        const top = new THREE.Mesh(geometries.treeTop, materials.treeTop);
        top.position.set(x, 2.8, z);
        top.castShadow = true;
        
        scene.add(trunk); scene.add(top);
        cityObjects.push(trunk, top);
    }

    function createBuilding(x, z, type) {
        let h, mat;
        if (type === 'house') { h = 2 + Math.random()*2; mat = materials.house; }
        else if (type === 'block') { h = 6 + Math.random()*5; mat = materials.block; }
        else { h = 20 + Math.random()*30; mat = materials.skyscrapers; } // Wieżowiec

        const bGeo = geometries.building.clone();
        bGeo.scale(6, h, 6); // Skalujemy bazową kostkę
        const b = new THREE.Mesh(bGeo, mat);
        b.position.set(x, h/2, z);
        b.castShadow = true;
        b.receiveShadow = true;
        scene.add(b);
        cityObjects.push(b);
    }

    // Generuj nowy sektor miasta
    function spawnCityChunk() {
        const z = cityZOffset;
        
        // Droga i Chodniki
        const road = new THREE.Mesh(geometries.road, materials.road);
        road.rotation.x = -Math.PI / 2;
        road.position.set(0, 0, z);
        road.receiveShadow = true;
        scene.add(road); cityObjects.push(road);

        const swL = new THREE.Mesh(geometries.sidewalk, materials.sidewalk);
        swL.rotation.x = -Math.PI / 2; swL.position.set(-8, 0.05, z); swL.receiveShadow = true;
        scene.add(swL); cityObjects.push(swL);
        const swR = swL.clone(); swR.position.set(8, 0.05, z);
        scene.add(swR); cityObjects.push(swR);

        // Losowe obiekty po bokach
        for (let i = 0; i < 2; i++) {
            const side = Math.random() > 0.5 ? 12 : -12;
            const posZ = z + (Math.random()*chunkSize - chunkSize/2);
            const r = Math.random();

            if (r < 0.3) createTree(side + (Math.random()*2 - 1), posZ);
            else if (r < 0.6) createBuilding(side + (Math.random()*2 - 1) * (side > 0 ? 1 : -1), posZ, 'house');
            else if (r < 0.9) createBuilding(side * 2 + (Math.random()*5 - 2.5), posZ, 'block');
            else createBuilding(side * 3 + (Math.random()*10 - 5), posZ, 'skyscraper');
        }

        // Rzeka (co 10 sektorów)
        if (Math.random() < 0.1) {
            const river = new THREE.Mesh(geometries.river, materials.river);
            river.rotation.x = -Math.PI / 2;
            river.position.set(0, -0.5, z - 50); // Dalej od drogi
            scene.add(river); cityObjects.push(river);
            // "Most" to po prostu droga bez trawy pod spodem
        }

        cityZOffset -= chunkSize; // Przesuń punkt spawnu do przodu
    }

    // Początkowe generowanie
    for (let i = 0; i < 10; i++) spawnCityChunk();

    // Podłoże (Trawa nieskończona)
    const grassGeo = new THREE.PlaneGeometry(1000, 1000);
    const grass = new THREE.Mesh(grassGeo, materials.grass);
    grass.rotation.x = -Math.PI / 2;
    grass.position.y = -0.1;
    grass.receiveShadow = true;
    scene.add(grass);

    // --- Fizyka Samochodu i Kontrola ---
    let speed = 0;
    let acceleration = 0;
    const maxSpeed = 0.8;
    const friction = 0.98;
    let turnAngle = 0;
    const inputs = { forward: false, backward: false, left: false, right: false };

    // PC Controls (Klawiatura)
    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowUp') inputs.forward = true;
        if (e.code === 'ArrowDown') inputs.backward = true;
        if (e.code === 'ArrowLeft') inputs.left = true;
        if (e.code === 'ArrowRight') inputs.right = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowUp') inputs.forward = false;
        if (e.code === 'ArrowDown') inputs.backward = false;
        if (e.code === 'ArrowLeft') inputs.left = false;
        if (e.code === 'ArrowRight') inputs.right = false;
    });

    // Touch Controls (Przyciski)
    function setupTouchBtn(id, inputKey) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); inputs[inputKey] = true; });
        btn.addEventListener('touchend', () => inputs[inputKey] = false);
    }
    setupTouchBtn('btn-gas', 'forward');
    setupTouchBtn('btn-brake', 'backward');
    setupTouchBtn('btn-left', 'left');
    setupTouchBtn('btn-right', 'right');


    // --- Pętla Gry ---
    const spedometerEl = document.getElementById('speedometer');

    function animate() {
        requestAnimationFrame(animate);

        // Fizyka ruchu
        if (inputs.forward) acceleration = 0.02;
        else if (inputs.backward) acceleration = -0.04; // Mocniejsze hamowanie/wsteczny
        else acceleration = 0;

        speed += acceleration;
        speed *= friction; // Opór powietrza
        
        // Ograniczenie prędkości
        if (speed > maxSpeed) speed = maxSpeed;
        if (speed < -maxSpeed/2) speed = -maxSpeed/2; // Wolniej do tyłu

        // Skręcanie (tylko gdy jedziesz)
        if (Math.abs(speed) > 0.05) {
            const turnSpeed = 0.03 * (speed > 0 ? 1 : -0.5); // Słabsze skręcanie na wstecznym
            if (inputs.left) turnAngle += turnSpeed;
            if (inputs.right) turnAngle -= turnSpeed;
        }

        // Aktualizacja pozycji samochodu
        car.rotation.y = turnAngle; // Obróć cały model
        // Jazda do przodu względem własnej rotacji
        car.translateZ(-speed);

        // Ograniczenie, żeby nie wyjechać poza miasto (na trawę za bardzo)
        if (car.position.x > 30) car.position.x = 30;
        if (car.position.x < -30) car.position.x = -30;

        // Kamera podąża za samochodem (Third Person)
        const cameraOffset = new THREE.Vector3(0, 3, 8); // Pozycja relative do auta
        cameraOffset.applyQuaternion(car.quaternion); // Obróć offset kamery tak jak auto
        camera.position.copy(car.position).add(cameraOffset);
        camera.lookAt(car.position.x, car.position.y + 1, car.position.z); // Patrz na środek auta

        // Przypnij trawę pod samochodem (złudzenie nieskończoności)
        grass.position.z = car.position.z;

        // UI Speed
        spedometerEl.innerText = `${Math.round(Math.abs(speed) * 200)} km/h`;

        // --- Zarządzanie nieskończonym miastem ---
        // Spoduj nowy sektor, jeśli zbliżamy się do końca wygenerowanego
        if (car.position.z < cityZOffset + 150) {
            spawnCityChunk();
        }

        // Usuwaj stare obiekty z tyłu (optymalizacja)
        for (let i = cityObjects.length - 1; i >= 0; i--) {
            if (cityObjects[i].position.z > car.position.z + 50) {
                scene.remove(cityObjects[i]);
                cityObjects.splice(i, 1);
            }
        }

        renderer.render(scene, camera);
    }

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>

</body>
</html>
