<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bebzun</title>
    <style>
        @font-face { 
            font-family: 'MojaCzcionka'; 
            src: url('ok.ttf?v=1') format('truetype');
            font-display: swap;
        }

        body { 
            background: #000; color: #00ff00; 
            font-family: 'MojaCzcionka', sans-serif; 
            margin: 0; overflow-y: auto; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        canvas { 
            border: 4px solid #00ff00; background: #0a0a0a; 
            display: block; margin: 10px auto; box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            touch-action: none;
        }

        .ui-panel { 
            width: 320px; padding: 10px; 
            touch-action: auto;
            position: relative; z-index: 100;
        }
        
        .leaderboard {
            background: #111; border: 2px solid #ffcc00; border-radius: 15px;
            padding: 10px; margin-top: 10px; text-align: left;
        }

        .leaderboard h3 { margin: 0 0 10px 0; color: #ffcc00; text-align: center; font-size: 18px; }
        
        .score-row { 
            display: flex; justify-content: space-between; 
            border-bottom: 1px dashed #333; padding: 5px 0; font-size: 14px;
        }

        .btn-back { 
            background: #ffcc00; color: #000; border: none; padding: 12px 25px; 
            border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold;
            font-family: inherit;
        }

        #game-over-msg { color: #ff0000; font-size: 20px; font-weight: bold; display: none; margin: 5px; }
    </style>
</head>
<body>

    <h2 style="color: #ffcc00; text-shadow: 0 0 10px #ffcc00;">FLAPPY BEBZUN 🦆</h2>
    <div id="game-over-msg">O MÓJ BEBZUN! 💥</div>
    
    <canvas id="gameCanvas" width="320" height="480"></canvas>

    <div class="ui-panel">
        <button class="btn-back" onclick="window.location.href='super.html'">POWRÓT DO MENU</button>

        <div class="leaderboard">
            <h3>🏆 NAJLEPSZE BRZUCHY</h3>
            <div id="leaderboard-list">Wczytywanie rekordów...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot, serverTimestamp, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPvjNjR6nTHQuWdhQGAGk9iJgvPKDQTXA",
            authDomain: "bebechchat.firebaseapp.com",
            projectId: "bebechchat",
            storageBucket: "bebechchat.firebasestorage.app",
            messagingSenderId: "738356779230",
            appId: "1:738356779230:web:2c41e46431284e3fb78a4f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const loggedUser = localStorage.getItem('loggedUser') || "Anonim";

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // ASSETS
        const bebuchImg = new Image(); bebuchImg.src = 'Bebuch.png';
        const chestImg = new Image(); chestImg.src = 'Chest.jpg';

        let bird = { x: 50, y: 200, w: 45, h: 45, gravity: 0.5, lift: -8, velocity: 0 };
        let pipes = [];
        let frame = 0;
        let score = 0;
        let gameRunning = true;

        function resetGame() {
            bird.y = 200; bird.velocity = 0;
            pipes = []; score = 0; frame = 0;
            gameRunning = true;
            document.getElementById("game-over-msg").style.display = "none";
            loop();
        }

        // --- INTELIGENTNY ZAPIS REKORDU ---
        async function saveScore(s) {
            if(s <= 0) return;
            const scoreRef = doc(db, "scores", loggedUser);
            
            try {
                const snap = await getDoc(scoreRef);
                if (!snap.exists() || s > snap.data().score) {
                    await setDoc(scoreRef, {
                        user: loggedUser,
                        score: s,
                        timestamp: serverTimestamp()
                    });
                    console.log("REKORD!");
                }
            } catch (e) { console.error("Błąd bazy:", e); }
        }

        function drawBird() {
            ctx.drawImage(bebuchImg, bird.x, bird.y, bird.w, bird.h);
        }

        function drawPipes() {
            pipes.forEach(p => {
                // Góra
                ctx.drawImage(chestImg, p.x, p.top - 400, p.w, 400);
                // Dół
                ctx.drawImage(chestImg, p.x, canvas.height - p.bottom, p.w, 400);
                
                ctx.strokeStyle = "#ffcc00";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, 0, p.w, p.top);
                ctx.strokeRect(p.x, canvas.height - p.bottom, p.w, p.bottom);
            });
        }

        function update() {
            if (!gameRunning) return;
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (frame % 100 === 0) {
                let gap = 135;
                let top = 50 + Math.random() * (canvas.height / 2.5);
                pipes.push({ x: canvas.width, w: 50, top: top, bottom: canvas.height - top - gap, passed: false });
            }

            pipes.forEach(p => {
                p.x -= 2.5;
                if (bird.x + 8 < p.x + p.w && bird.x + bird.w - 8 > p.x &&
                    (bird.y + 8 < p.top || bird.y + bird.h - 8 > canvas.height - p.bottom)) {
                    endGame();
                }
                if (!p.passed && p.x + p.w < bird.x) {
                    score++;
                    p.passed = true;
                }
            });

            if (bird.y + bird.h > canvas.height || bird.y < 0) endGame();
            pipes = pipes.filter(p => p.x + p.w > -50);
            frame++;
        }

        function endGame() {
            gameRunning = false;
            document.getElementById("game-over-msg").style.display = "block";
            saveScore(score);
            setTimeout(resetGame, 1500);
        }

        function loop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPipes();
            drawBird();
            update();
            ctx.fillStyle = "#ffcc00";
            ctx.font = "bold 24px Arial";
            ctx.fillText("BRZUCHY: " + score, 15, 35);
            requestAnimationFrame(loop);
        }

        const flap = () => { if(gameRunning) bird.velocity = bird.lift; };
        window.addEventListener("keydown", (e) => { if(e.code === "Space") flap(); });
        canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); flap(); });

        function loadLeaderboard() {
            const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(5));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `
                        <div class="score-row">
                            <span style="color:#00ff00">${data.user}</span> 
                            <span style="color:#ffcc00; font-weight:bold;">${data.score}</span>
                        </div>`;
                });
            });
        }

        loadLeaderboard();
        loop();
    </script>
</body>
</html>
