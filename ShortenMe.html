<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Shortener</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { margin-bottom: 1.5rem; font-weight: 600; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #334155;
            border-radius: 6px;
            display: none; 
        }

        #shortUrl {
            color: #818cf8;
            word-break: break-all;
            font-weight: bold;
        }

        .loader {
            display: none;
            margin: 10px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Link Shortener 🔗</h1>
    <input type="url" id="longUrl" placeholder="Wklej link">
    <button id="shortenBtn">Skróć link!</button>
    
    <div class="loader" id="loader"></div>

    <div id="result">
        <p style="margin-top:0">Gotowe! Oto Twój link:</p>
        <a href="#" id="shortUrl" target="_blank"></a>
        <button id="copyBtn" style="margin-top: 10px; background: #10b981;">Kopiuj</button>
    </div>
</div>
  
<script>
    const btn = document.getElementById('shortenBtn');
    const input = document.getElementById('longUrl');
    const resultDiv = document.getElementById('result');
    const resultLink = document.getElementById('shortUrl');
    const loader = document.getElementById('loader');
    const copyBtn = document.getElementById('copyBtn');

    btn.addEventListener('click', async () => {
        const url = input.value.trim();

        if (!url) {
            alert("A gdzie link?");
            return;
        }

        loader.style.display = 'block';
        resultDiv.style.display = 'none';

        try {
            const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(url)}`);
            
            if (!response.ok) throw new Error();

            const shortUrl = await response.text();

            resultLink.innerText = shortUrl;
            resultLink.href = shortUrl;
            resultDiv.style.display = 'block';
        } catch (error) {
            alert("Błąd! API nie odpowiada albo link jest zły.");
        } finally {
            loader.style.display = 'none';
        }
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(resultLink.innerText);
        copyBtn.innerText = "Skopiowano! ✅";
        setTimeout(() => { copyBtn.innerText = "Kopiuj"; }, 2000);
    });
</script>

</body>
</html>
