<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrkaVid - Twoja Telewizja 📺</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ff0055; text-shadow: 0 0 15px #ff0055; font-size: 3em; letter-spacing: 2px; }
        .info-box { background: #111; border: 2px solid #ff0055; padding: 20px; border-radius: 15px; max-width: 600px; margin: 20px auto; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3); }
        .contact-info { color: #aaa; font-size: 0.9em; margin-top: 10px; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; }
        .video-card { background: #111; border: 1px solid #333; border-radius: 10px; overflow: hidden; transition: 0.2s; }
        .video-card:hover { transform: translateY(-5px); border-color: #ff0055; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.2); }
        .video-title { padding: 10px; font-weight: bold; color: #ff0055; }
        
        /* Styl dla iframe (YouTube) */
        .video-card iframe { width: 100%; height: 200px; border: none; }
        
        /* Styl dla Twoich plików mp4 (jeśli masz je w repo) */
        .video-card video { width: 100%; height: 200px; background: black; }

        .back-link { margin-top: 50px; display: block; color: #555; text-decoration: none; }
        .back-link:hover { color: #ff0055; }
    </style>
</head>
<body>

    <h1>OrkaVid</h1>

    <div class="info-box">
        <p>Siemano! To jest orkavid</p>
        <p><strong>ZASADA JEST PROSTA:</strong></p>
        <p>Jeśli chcesz tu jakiś film, po prostu poproś mnie, żebym go dodał. I... dodam!</p>
        <p class="contact-info">(napisz lub powiedz)</p>
    </div>

    <div class="video-grid">
        
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Coś klasycznego" allowfullscreen></iframe>
            <div class="video-title">Film niedługo</div>
        </div>

        <div class="video-card">
            <video controls>
                <source src="chyba wiesz" type="video/mp4">
                Twoja przeglądarka nie obsługuje video.
            </video>
            <div class="video-title">Film</div>
        </div>

        </div>

    <a href="super.html" class="back-link">POWRÓT DO ORKANETU</a>

</body>
</html>
