<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aparat z bebzuna</title>
    <style>
        body { 
            background: #000; color: #00e6ff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden;
        }

        /* Tytuł z jasnoniebieskim neonem */
        h1 { 
            color: #00e6ff; text-shadow: 0 0 15px #00e6ff; margin: 10px 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px;
        }

        /* Kontener na podgląd z kamery */
        #camera-container {
            position: relative; width: 90%; max-width: 600px; aspect-ratio: 4/3; 
            background: #050505; border: 3px solid #00e6ff; border-radius: 15px; 
            box-shadow: 0 0 25px rgba(0, 230, 255, 0.6); overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Sam element wideo */
        #video {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Przycisk do robienia zdjęcia - jasnoniebieski */
        #snapBtn {
            background: #00e6ff; color: #000; border: none; padding: 15px 30px; 
            font-size: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer; 
            border-radius: 50px; margin-top: 25px; transition: 0.2s; 
            box-shadow: 0 0 15px #00e6ff; outline: none;
        }
        #snapBtn:hover { 
            background: #fff; box-shadow: 0 0 25px #fff; transform: scale(1.1); 
        }
        #snapBtn:disabled {
            background: #222; color: #555; box-shadow: none; cursor: not-allowed;
        }

        /* Kontener na zrobione zdjęcie (płótno) */
        #canvas {
            display: none; width: 90%; max-width: 600px; aspect-ratio: 4/3; 
            border: 3px solid #00e6ff; border-radius: 15px; box-shadow: 0 0 15px rgba(0, 230, 255, 0.4); margin-top: 20px;
        }

        /* Informacja o błędzie */
        #errorMessage {
            color: #ff3333; font-weight: bold; display: none; margin-top: 15px; text-align: center;
        }

    </style>
</head>
<body>

    <h1>APARAT</h1>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <p id="errorMessage">twój telefon jest zepsuty</p>
    </div>

    <button id="snapBtn">PSTRYKAJ FOTĘ!</button>

    <canvas id="canvas"></canvas>
<img id="photoResult" style="display:none; width: 90%; max-width: 600px; border: 3px solid #00e6ff; border-radius: 15px; margin-top: 20px;">

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snapBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Funkcja uruchamiająca kamerę
        async function startCamera() {
            try {
                // Prosimy o dostęp do kamery wideo
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.error("Błąd kamery: ", err);
                video.style.display = 'none';
                errorMessage.style.display = 'block';
                snapBtn.disabled = true;
            }
        }

        // Robienie zdjęcia po kliknięciu guzika
                snapBtn.onclick = () => {
            const photoResult = document.getElementById('photoResult');
            
            // 1. Ustawiamy wymiary płótna
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // 2. Rysujemy klatkę z wideo na płótnie
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 3. KONWERTUJEMY płótno na prawdziwy obrazek (DataURL)
            const dataUrl = canvas.toDataURL('image/png');
            
            // 4. Wstawiamy ten "kod" obrazka do elementu IMG
            photoResult.src = dataUrl;
            
            // 5. Pokazujemy obrazek, a chowamy podgląd (opcjonalnie)
            photoResult.style.display = 'block';
            
            // Scrollujemy w dół, żeby było widać fotkę
            photoResult.scrollIntoView({ behavior: 'smooth' });
        };

        // Uruchamiamy aparat przy starcie strony
        startCamera();
    </script>
</body>
</html>
