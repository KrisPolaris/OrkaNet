<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hrm</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .bg-image {
            /* Tło z Twoim zdjęciem */
            background-image: url('Random.jpg');
            
            /* Magia rozciągania */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            /* Ustawienie na cały ekran */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            color: white;
            font-family: sans-serif;
            font-size: 5em;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); /* Żeby było widać na jasnym tle */
        }

        .btn-kieruj {
            padding: 15px 40px;
            font-size: 1.5em;
            cursor: pointer;
            background: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-kieruj:hover {
            background: #ddd;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <h1>Hrm</h1>
        
        <form action="brrbrr.html">
            <button type="submit" class="btn-kieruj">PRZEKIERUJ</button>
        </form>
    </div>

</body>
</html>
