<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* CLEAN PROFESSIONAL STYLING */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .systems-container {
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid #0044ff;
        }

        h1 {
            color: #0088ff;
            text-shadow: 0 0 10px #0044ff;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        /* BLUE GLOW TILES */
        .tile {
            background: #0a0a0a;
            border: 2px solid #0044ff;
            border-radius: 10px;
            padding: 20px;
            width: 250px;
            box-shadow: 0 0 15px rgba(0, 68, 255, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 68, 255, 0.6);
        }

        .tile h1 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .tile p {
            font-size: 0.9em;
            color: #cccccc;
            line-height: 1.4;
        }

        /* REDIRECT BUTTONS */
        .btn-redirect {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: transparent;
            color: #0088ff;
            border: 1px solid #0088ff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-redirect:hover {
            background: #0088ff;
            color: #000000;
            box-shadow: 0 0 10px #0088ff;
        }
    </style>
</head>
<body>

    <div class="systems-container">
        <h1>YOURTEXTHERE</h1>
        <p>YOURTEXTHERE</p>

        <div class="grid">
            <div class="tile">
                <h1>YOURTEXTHERE</h1>
                <p>YOURTEXTHERE</p>
                <p>YOURTEXTHERE</p>
                <p>YOURTEXTHERE</p>
                <a href="YOURTEXTHERE" class="btn-redirect">YOURTEXTHERE</a>
            </div>

            <div class="tile">
                <h1>YOURTEXTHERE</h1>
                <p>YOURTEXTHERE</p>
                <p>YOURTEXTHERE</p>
                <p>YOURTEXTHERE</p>
                <a href="YOURTEXTHERE" class="btn-redirect">YOURTEXTHERE</a>
            </div>

            <div class="tile">
                <h1>YOURTEXTHERE</h1>
                <p>YOURTEXTHERE</p>
                <p>YOURTEXTHERE</p>
                <p>YOURTEXTHERE</p>
                <a href="YOURTEXTHERE" class="btn-redirect">YOURTEXTHERE</a>
            </div>
        </div>
    </div>

</body>
</html>
