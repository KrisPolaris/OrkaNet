<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>OrkaNotes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{
    background:#050505;
    color:#fff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.app{
    width:100%;
    max-width:480px;
    padding:20px;
}
h1{
    font-size:24px;
    margin-bottom:10px;
    color:#22c55e;
}
.info{
    font-size:12px;
    color:#888;
    margin-bottom:10px;
}
textarea{
    width:100%;
    height:60vh;
    background:#0f0f0f;
    color:#fff;
    border:1px solid #222;
    border-radius:10px;
    padding:10px;
    font-size:15px;
    resize:none;
}
</style>
</head>
<body>

<div class="app">
    <h1>Notesik</h1>
    <div class="info">
        Nie no to jakiś bebech
    </div>
    <textarea placeholder="Napisz coś"></textarea>
</div>
<script>
const textarea = document.querySelector('textarea');

// Załaduj notatki przy starcie
textarea.value = localStorage.getItem('orkaNotes') || '';

// Zapisuj przy każdej zmianie
textarea.addEventListener('input', () => {
    localStorage.setItem('orkaNotes', textarea.value);
});
</script>
</body>
</html>
