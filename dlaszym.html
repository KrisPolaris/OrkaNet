<!DOCTYPE html>
<html>
<head>
<style>
  /* Główne tło gry */
  body {
    margin: 0;
    background: #70c5ce;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Kontener gry */
  .game-world {
    position: relative;
    width: 300px;
    height: 500px;
    background: #70c5ce;
    border: 4px solid #555;
    overflow: hidden;
  }

  /* --- MECHANIKA SKOKU --- */
  /* Tworzymy niewidzialną warstwę, która łapie kliki */
  @keyframes fly {
    0% { transform: translateY(0); }
    100% { transform: translateY(400px); } /* Grawitacja */
  }

  .bird-container {
    position: absolute;
    left: 50px;
    top: 200px;
    width: 30px;
    height: 30px;
    z-index: 10;
    /* Grawitacja: ptak ciągle spada */
    animation: fly 3s linear infinite;
  }

  /* Trik: Każde kliknięcie w przycisk resetuje animację "skoku" */
  #jump-trigger {
    display: none;
  }

  .jump-button {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 100;
    cursor: pointer;
  }

  /* Gdy przycisk jest aktywny (kliknięty), ptak leci w górę */
  .jump-button:active ~ .bird-container {
    transition: transform 0.2s ease-out;
    transform: translateY(-80px);
  }

  .bird {
    width: 30px;
    height: 24px;
    background: #f7e61c;
    border: 2px solid #000;
    border-radius: 50%;
    position: relative;
  }

  /* Oko i dziób */
  .bird::after {
    content: '';
    position: absolute;
    right: 5px;
    top: 5px;
    width: 5px;
    height: 5px;
    background: #000;
    border-radius: 50%;
  }

  /* --- PRZESZKODY (RURY) --- */
  @keyframes pipe-move {
    from { right: -100px; }
    to { right: 400px; }
  }

  .pipe {
    position: absolute;
    right: -100px;
    width: 50px;
    background: #73bf2e;
    border: 3px solid #000;
    animation: pipe-move 4s linear infinite;
  }

  .pipe-top {
    height: 150px;
    top: 0;
    border-radius: 0 0 5px 5px;
  }

  .pipe-bottom {
    height: 200px;
    bottom: 0;
    border-radius: 5px 5px 0 0;
  }

  /* Druga fala rur z opóźnieniem */
  .pipe-2 {
    animation-delay: 2s;
  }

  /* --- INFO --- */
  .ui {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-weight: bold;
    text-shadow: 2px 2px #000;
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="game-world">
    <div class="jump-button"></div>
    
    <div class="ui">KLIKAJ ŻEBY SKAKAĆ!</div>

    <div class="bird-container">
      <div class="bird"></div>
    </div>

    <div class="pipe pipe-top pipe-1"></div>
    <div class="pipe pipe-bottom pipe-1"></div>

    <div class="pipe pipe-top pipe-2" style="height: 100px;"></div>
    <div class="pipe pipe-bottom pipe-2" style="height: 250px;"></div>
  </div>

</body>
</html>
