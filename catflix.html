<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotflix - Filmy</title>
    
    <script>
        // SPRAWDZANIE LOGOWANIA
        // Jeśli w pamięci przeglądarki nie ma klucza 'loggedUser', wracamy do logowania
        if (!localStorage.getItem('loggedUser')) {
            alert("Ej, najpierw się zaloguj!");
            window.location.href = "index.html";
        }
    </script>

        body {
            background-color: black;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: space-between; /* Żeby przycisk wyloguj był po boku */
            align-items: center;
            background-color: black;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .logo {
            height: 35px;
            margin-left: 15px;
        }

        .logout-btn {
            background: #e50914;
            color: white;
            border: none;
            padding: 5px 10px;
            margin-right: 15px;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            padding: 10px;
        }

        .section-title {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #e5e5e5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .movie-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            background-color: #141414;
            border-radius: 4px;
            overflow: hidden;
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border: 0;
        }

        .movie-card p {
            font-size: 0.75em;
            margin: 6px;
            text-align: center;
            color: #b3b3b3;
        }
    </style>
</head>

        }
