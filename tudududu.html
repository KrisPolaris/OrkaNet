<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dźwięki</title>
<style>
  body {
    margin: 0;
    background-color: #000;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
  }

  header {
    background-color: #111;
    padding: 20px 0;
    font-size: 2em;
    font-weight: bold;
  }

  .sound-button {
    display: inline-block;
    margin: 15px;
    padding: 10px;
    border: 2px solid #fff;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .sound-button:hover {
    transform: scale(1.1);
  }

  iframe {
    display: block;
    margin: 10px auto;
    width: 110px;
    height: 200px;
    border: 0;
    scrolling: no;
  }

  @media (max-width: 500px) {
    iframe {
      width: 90px;
      height: 160px;
    }
  }
</style>
</head>
<body>

<header>Dźwięki</header>

<div class="sound-button">
  Discord Powiadomienie
  <iframe src="https://www.myinstants.com/instant/discord-notification-38119/embed/"></iframe>
</div>

<div class="sound-button">
  Geometry Dash
  <iframe src="https://www.myinstants.com/instant/geometry-dash-53551/embed/"></iframe>
</div>

<div class="sound-button">
  Paróweczki, kajzereczki
  <iframe src="https://www.myinstants.com/instant/paroweczki-kajzereczki-i-czteropak-47353/embed/"></iframe>
</div>

<div class="sound-button">
  Nokia
  <iframe src="https://www.myinstants.com/instant/nokias-ringtone-9624/embed/"></iframe>
</div>

<div class="sound-button">
  Oof
  <iframe src="https://www.myinstants.com/instant/roblox-oof/embed/"></iframe>
</div>

</body>
</html>
