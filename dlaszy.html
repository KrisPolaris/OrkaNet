<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background-color: #008080; /* Klasyczny kolor tła starego Windowsa */
    font-family: sans-serif;
    margin: 0;
    overflow: hidden;
  }

  /* Pasek zadań */
  .taskbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: #c0c0c0;
    border-top: 2px solid #ffffff;
    display: flex;
    align-items: center;
    padding: 0 5px;
    z-index: 100;
  }

  .start-button {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    padding: 2px 10px;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
  }

  /* Mechanizm okienek bez JS (Checkbox Hack) */
  #window-toggle {
    display: none;
  }

  .window {
    display: none;
    position: absolute;
    top: 50px;
    left: 50px;
    width: 300px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
  }

  /* Jeśli checkbox jest zaznaczony, pokaż okno */
  #window-toggle:checked ~ .window {
    display: block;
  }

  .title-bar {
    background: linear-gradient(90deg, #000080, #1084d0);
    color: white;
    padding: 3px 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: bold;
  }

  .close-btn {
    background: #c0c0c0;
    color: black;
    border: 1px solid #000;
    width: 16px;
    height: 14px;
    text-align: center;
    line-height: 12px;
    cursor: pointer;
  }

  .window-content {
    padding: 20px;
    font-size: 14px;
  }

  /* Ikona na pulpicie */
  .desktop-icon {
    width: 70px;
    text-align: center;
    margin: 20px;
    cursor: pointer;
    color: white;
    font-size: 12px;
  }

  .icon-box {
    width: 40px;
    height: 40px;
    background: #ff0000;
    margin: 0 auto 5px;
    border: 2px solid #fff;
  }
</style>
</head>
<body>

  <input type="checkbox" id="window-toggle">

  <label for="window-toggle">
    <div class="desktop-icon">
      <div class="icon-box"></div>
      okienko
    </div>
  </label>

  <div class="window">
    <div class="title-bar">
      <span>Informacje</span>
      <label for="window-toggle" class="close-btn">X</label>
    </div>
    <div class="window-content">
      <p>Mam pytanie...</p>
      <p>działa to na garrecie.</p>
      <hr>
      <p>Jeśli działa to napisz.</p>
    </div>
  </div>

  <div class="taskbar">
    <div class="start-button">Start</div>
  </div>

</body>
</html>
